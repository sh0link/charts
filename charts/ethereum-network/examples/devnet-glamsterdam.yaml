# Glamsterdam (post-Fusaka, EL = "gloas") devnet using ethpandaops client
# builds from glamsterdam-devnets/devnet-3 (bal-devnet-6 / glamsterdam-devnet-3).
#
# Image set mirrors:
#   https://github.com/ethpandaops/glamsterdam-devnets/blob/master/ansible/inventories/devnet-3/group_vars/all/images.yaml
#
# 3 validators + 1 RPC, all geth+lighthouse for stability (prysm/teku/etc
# from the same image set should also work with these custom builds, but
# this example focuses on a known-good baseline).
#
# Install:
#   helm install ethereum-devnet-glamsterdam ./charts/charts/ethereum-network \
#     -f charts/charts/ethereum-network/examples/devnet-glamsterdam.yaml \
#     -n infra --create-namespace \
#     --set dora.enabled=true --set spamoor.enabled=true --set blockscout.enabled=true

mode: devnet
baseDomain: local.sh0.link
domainSuffixEnabled: true

# ── peripheral images (mirror glamsterdam-devnet-3 inventory) ─────────
dora:
  image:
    repository: ethpandaops/dora
    tag: master-latest

spamoor:
  image:
    repository: ethpandaops/spamoor
    tag: master-latest

blockscout:
  # Inventory pins `blockscout/blockscout:latest`; chart's default tag
  # 5.4.0 is the last monolithic image (frontend bundled). v6+ split the
  # frontend out, and `latest` already moved to v8+ which breaks our
  # single-pod assumption. Pin to 5.4.0 unless you also wire up the
  # separate blockscout frontend service.
  image: blockscout/blockscout:5.4.0

devnet:
  chainId: 32384
  # glamsterdam ethpandaops builds are compiled with mainnet preset spec
  # constants only — minimal preset triggers
  # "YAML configuration incompatible with spec constants for minimal" in
  # lighthouse:glamsterdam-devnet-3.
  preset: mainnet
  validatorCount: 192
  genesisGenerator:
    # 6.0.5 ships the gloas (Amsterdam) fork; we hand-set GLOAS_FORK_EPOCH=0
    # via extraEnv to activate it at genesis.
    image: ethpandaops/ethereum-genesis-generator:6.0.5
    # elFork/clFork are advisory in 6.x — the actual switch is the per-fork
    # EPOCH env. Keep them informative.
    elFork: gloas
    clFork: gloas
    genesisDelay: 30
    mnemonic: "test test test test test test test test test test test alone"
    extraEnv:
      # All earlier forks already default to epoch 0 (cancun → fulu).
      # Activate Glamsterdam (gloas) at genesis. Heze and EIP-7928 stay at
      # the "never" sentinel so CL clients don't trip on unknown fields.
      GLOAS_FORK_EPOCH: "0"
  genesisService:
    image: ghcr.io/sh0link/debugger:1.0.0
    persistence: { size: 1Gi }

p2pKey:
  enabled: true
  indexStart: 100

peerTable:
  enabled: true

# ── shared geth (ethpandaops bal-devnet-6 build) ─────────────────────
_geth_command: &geth_command
  - geth
  - --config=/peers/geth-config.toml
  - --datadir=/data/ethereum
  - --networkid=32382
  - --syncmode=full
  - --gcmode=archive
  - --state.scheme=path
  - --http
  - --http.api=eth,net,web3,debug,txpool,admin
  - --http.addr=0.0.0.0
  - --http.vhosts=*
  - --http.corsdomain=*
  - --ws
  - --ws.addr=0.0.0.0
  - --authrpc.port=8551
  - --authrpc.addr=0.0.0.0
  - --authrpc.vhosts=*
  - --authrpc.jwtsecret=/jwt/jwtsecret
  - --metrics
  - --metrics.addr=0.0.0.0
  - --metrics.port=6061
  - --discovery.dns=
  - --maxpeers=10
  - --port=30303

_geth_node: &geth_node
  client: geth
  image: { repository: ethpandaops/geth, tag: bal-devnet-6 }
  dataPath: /data/ethereum
  command: *geth_command
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "2",  memory: 4Gi }
  persistence: { size: 20Gi }
  ports:
    - { name: rpc,     port: 8545 }
    - { name: ws,      port: 8546 }
    - { name: authrpc, port: 8551 }
    - { name: p2p,     port: 30303 }
    - { name: metric,  port: 6061 }

# ── shared lighthouse (ethpandaops glamsterdam-devnet-3) ─────────────
_lh_command: &lh_command
  - |
    BOOT_NODES=""
    if [ -s /shared/cl-bootnodes.txt ]; then
      BOOT_NODES="--boot-nodes=$(cat /shared/cl-bootnodes.txt)"
    fi
    exec lighthouse beacon_node \
      --datadir=/data/lighthouse \
      --testnet-dir=/shared/metadata \
      --http --http-address=0.0.0.0 --http-port=5052 --http-allow-origin='*' \
      --metrics --metrics-address=0.0.0.0 --metrics-port=5054 \
      --port=9000 --listen-address=0.0.0.0 \
      --execution-endpoint=http://localhost:8551 \
      --execution-jwt=/jwt/jwtsecret \
      --enable-private-discovery \
      --enr-address="$POD_IP" \
      --enr-tcp-port=9000 --enr-udp-port=9000 --enr-quic-port=9001 \
      --allow-insecure-genesis-sync \
      --subscribe-all-subnets \
      $BOOT_NODES \
      --suggested-fee-recipient=0x0000000000000000000000000000000000000000

_lh_node: &lh_node
  client: lighthouse
  image: { repository: ethpandaops/lighthouse, tag: glamsterdam-devnet-3 }
  dataPath: /data/lighthouse
  commandShell: true
  command: *lh_command
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "1",  memory: 4Gi }
  persistence: { size: 10Gi }
  ports:
    - { name: beacon, port: 5052 }
    - { name: p2p,    port: 9000 }
    - { name: metric, port: 5054 }

# ── topology ─────────────────────────────────────────────────────────
nodes:
  - name: validator1
    role: validator
    el: *geth_node
    cl: *lh_node
    validatorKeys: { indexStart: 0,   indexEnd: 64 }

  - name: validator2
    role: validator
    el: *geth_node
    cl: *lh_node
    validatorKeys: { indexStart: 64,  indexEnd: 128 }

  - name: validator3
    role: validator
    el: *geth_node
    cl: *lh_node
    validatorKeys: { indexStart: 128, indexEnd: 192 }

  - name: rpc1
    role: rpc
    el: *geth_node
    cl: *lh_node

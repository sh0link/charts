# Single-validator Glamsterdam devnet: 1 geth + 1 lighthouse.
#
# Image set follows glamsterdam-devnet-3 inventory:
#   https://github.com/ethpandaops/glamsterdam-devnets/blob/master/ansible/inventories/devnet-3/group_vars/all/images.yaml
#   geth:        ethpandaops/geth:bal-devnet-6
#   lighthouse:  ethpandaops/lighthouse:glamsterdam-devnet-3
#
# Same topology as devnet-single-prysm but with the lighthouse CL —
# useful as a reference when prysm-specific quirks (e.g. forkchoice
# update behaviour for EL finalized hash) need to be ruled out.
#
# Install:
#   helm install ethereum-devnet-1 ./charts/charts/ethereum-network \
#     -f charts/charts/ethereum-network/examples/devnet-single-lighthouse.yaml \
#     -n infra --create-namespace

mode: devnet
baseDomain: local.sh0.link
domainSuffixEnabled: true

# ── peripherals (mirror glamsterdam-devnet-3 inventory) ──────────────
dora:
  enabled: true
  image:
    repository: ethpandaops/dora
    tag: master-latest
spamoor:
  enabled: true
  image:
    repository: ethpandaops/spamoor
    tag: master-latest
blockscout:
  enabled: true
  # Chart only supports the monolithic v5 image.
  image: blockscout/blockscout:5.4.0

devnet:
  chainId: 32387
  # ethpandaops glamsterdam-devnet-3 builds use mainnet preset spec
  # constants — minimal preset is rejected at startup.
  preset: mainnet
  validatorCount: 64
  genesisGenerator:
    image: ethpandaops/ethereum-genesis-generator:6.0.5
    elFork: gloas
    clFork: gloas
    genesisDelay: 30
    mnemonic: "test test test test test test test test test test test alone"
    # Activate Glamsterdam (gloas) at genesis.
    #
    # Upstream glamsterdam-devnet-3 uses epoch 1 (one Fulu epoch before
    # the PTC/EPB flip). Verified locally that this triggers
    # `BeaconStateError(IncorrectStateVariant)` on `PTC duties` calls
    # during epoch 0 (vc requests Gloas-only duties before the fork
    # activates) — every slot is missed and the chain never advances.
    # Likely root cause: GLOAS_FORK_VERSION mismatch with upstream
    # (0x80000000 vs upstream 0x80467850), which makes lighthouse's
    # version-domain checks misroute duty dispatch.
    #
    # Until the chart wires through GLOAS_FORK_VERSION via genesis-
    # generator env, epoch 0 is the only stable choice — Gloas runs
    # from genesis, no Fulu→Gloas transition, no PTC duty mismatch.
    extraEnv:
      GLOAS_FORK_EPOCH: "0"
  genesisService:
    image: ghcr.io/sh0link/debugger:1.0.0
    persistence: { size: 1Gi }

p2pKey:
  enabled: true
  indexStart: 100

peerTable:
  enabled: true

# ── geth (ethpandaops bal-devnet-6 build) ────────────────────────────
_geth_command: &geth_command
  - geth
  - --config=/peers/geth-config.toml
  - --datadir=/data/ethereum
  - --networkid=32387
  - --syncmode=full
  - --gcmode=archive
  - --state.scheme=path
  - --http
  - --http.api=eth,net,web3,debug,txpool,admin
  - --http.addr=0.0.0.0
  - --http.vhosts=*
  - --http.corsdomain=*
  - --ws
  - --ws.addr=0.0.0.0
  - --authrpc.port=8551
  - --authrpc.addr=0.0.0.0
  - --authrpc.vhosts=*
  - --authrpc.jwtsecret=/jwt/jwtsecret
  - --metrics
  - --metrics.addr=0.0.0.0
  - --metrics.port=6061
  - --discovery.dns=
  - --maxpeers=10
  - --port=30303

_geth_node: &geth_node
  client: geth
  image: { repository: ethpandaops/geth, tag: bal-devnet-6 }
  dataPath: /data/ethereum
  command: *geth_command
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "2",  memory: 4Gi }
  persistence: { size: 20Gi }
  ports:
    - { name: rpc,     port: 8545 }
    - { name: ws,      port: 8546 }
    - { name: authrpc, port: 8551 }
    - { name: p2p,     port: 30303 }
    - { name: metric,  port: 6061 }

# ── lighthouse (ethpandaops glamsterdam-devnet-3 build) ──────────────
_lh_command: &lh_command
  - |
    BOOT_NODES=""
    if [ -s /shared/cl-bootnodes.txt ]; then
      BOOT_NODES="--boot-nodes=$(cat /shared/cl-bootnodes.txt)"
    fi
    exec lighthouse beacon_node \
      --datadir=/data/lighthouse \
      --testnet-dir=/shared/metadata \
      --http --http-address=0.0.0.0 --http-port=5052 --http-allow-origin='*' \
      --metrics --metrics-address=0.0.0.0 --metrics-port=5054 \
      --port=9000 --listen-address=0.0.0.0 \
      --execution-endpoint=http://localhost:8551 \
      --execution-jwt=/jwt/jwtsecret \
      --enable-private-discovery \
      --enr-address="$POD_IP" \
      --enr-tcp-port=9000 --enr-udp-port=9000 --enr-quic-port=9001 \
      --allow-insecure-genesis-sync \
      --subscribe-all-subnets \
      $BOOT_NODES \
      --suggested-fee-recipient=0x0000000000000000000000000000000000000000

_lh_node: &lh_node
  client: lighthouse
  image: { repository: ethpandaops/lighthouse, tag: glamsterdam-devnet-3 }
  dataPath: /data/lighthouse
  commandShell: true
  command: *lh_command
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits:   { cpu: "1",  memory: 4Gi }
  persistence: { size: 10Gi }
  ports:
    - { name: beacon, port: 5052 }
    - { name: p2p,    port: 9000 }
    - { name: metric, port: 5054 }

nodes:
  - name: validator1
    role: validator
    el: *geth_node
    cl: *lh_node
    validatorKeys: { indexStart: 0, indexEnd: 64 }

grafanaDashboard:
  enabled: true

{{- if .Values.blockscout.enabled -}}
{{- $rel := include "ethereum-network.fullname" . -}}
{{- $secretName := printf "%s-blockscout-secret" $rel -}}
{{/* Preserve secret-key-base across helm upgrades so blockscout session
     state survives restarts. */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $secretKeyBase := "" -}}
{{- if and $existing $existing.data (index $existing.data "secret-key-base") -}}
{{- $secretKeyBase = index $existing.data "secret-key-base" | b64dec -}}
{{- else -}}
{{- $secretKeyBase = randAlphaNum 64 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "ethereum-network.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret-key-base: {{ $secretKeyBase | quote }}
{{- end }}

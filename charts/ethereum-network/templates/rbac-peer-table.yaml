{{- if include "ethereum-network.peerTableEnabled" . -}}
{{- $rel := include "ethereum-network.fullname" . -}}
{{- $saName := printf "%s-peer-table" $rel -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $saName }}
  labels:
    {{- include "ethereum-network.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $saName }}
  labels:
    {{- include "ethereum-network.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    # Restrict create/update to the single predictable peer-table name so a
    # compromised Job pod can't tamper with arbitrary cluster ConfigMaps.
    resourceNames: ["{{ $rel }}-peer-table"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $saName }}
  labels:
    {{- include "ethereum-network.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $saName }}
subjects:
  - kind: ServiceAccount
    name: {{ $saName }}
    namespace: {{ .Release.Namespace }}
{{- end }}

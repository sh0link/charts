{{/*
Shared mnemonic Secret. Consumed by:
  - validator key generation (devnet, init container of genesis sts)
  - p2p key derivation init container in every node sts
  - peer-table Job

Only rendered when a mnemonic is available — join.public deliberately has none.
*/}}
{{- $m := include "ethereum-network.effectiveMnemonic" . -}}
{{- if $m -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ethereum-network.fullname" . }}-mnemonic
  labels:
    {{- include "ethereum-network.labels" . | nindent 4 }}
type: Opaque
stringData:
  mnemonic: {{ $m | quote }}
{{- end }}
